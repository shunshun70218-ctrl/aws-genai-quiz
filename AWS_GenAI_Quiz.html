ifecycle hooks and restart policies.", "D": "Integrate an Amazon API Gateway REST API with an AWS Lambda function that invokes Amazon Bedrock. Use Lambda response streaming to stream responses. Enforce token limits within the Lambda function. Implement retry logic by using Lambda and API Gateway timeout configurations."}, "answers": ["D"], "explain": "「串流 + token 限制 + 重試 + 最少負擔 + Bedrock 託管」→ API Gateway REST API + Lambda + Lambda response streaming(串流)+ Lambda 內 token 限制 + 逾時重試,全 serverless 免管。〔註:A(HTTP API + Lambda,其餘相同)亦為部分題庫答案——HTTP API 更輕更省延遲更低;但考試慣例常以「REST API + Lambda response streaming」為標準答案,故本題依使用者定案選 D。〕用戶端輪詢(B)非真串流;ECS 容器(C)自管負擔最高。"}, {"num": 83, "stem": "A retail company is using Amazon Bedrock to develop a customer service AI assistant. Analysis shows that 70% of customer inquiries are simple product questions that a smaller model can effectively handle. However, 30% of inquiries are complex return policy questions that require advanced reasoning. The company wants to implement a cost-effective model selection framework to automatically route customer inquiries to appropriate models based on inquiry complexity. The framework must maintain high customer satisfaction and minimize response latency. Which solution will meet these requirements with the LEAST implementation effort?", "options": {"A": "Create a multi-stage architecture that uses a small foundation model (FM) to classify the complexity of each inquiry. Route simple inquiries to a smaller, more cost-effective model. Route complex inquiries to a larger, more capable model. Use AWS Lambda functions to handle the routing logic.", "B": "Use Amazon Bedrock intelligent prompt routing to automatically analyze inquiries. Route simple product inquiries to smaller models, and route complex return policy inquiries to more capable larger models.", "C": "Implement a single-model solution that uses an Amazon Bedrock mid-sized foundation model (FM) with on-demand pricing. Include special instructions in model prompts to handle both simple and complex inquiries by using the same model.", "D": "Create separate Amazon Bedrock endpoints for simple and complex inquiries. Implement a rule-based routing system based on keyword detection. Use on-demand pricing for the smaller model and provisioned throughput for the larger model."}, "answers": ["B"], "explain": "依複雜度自動路由模型 + 成本效益 + 最少實作 → Bedrock intelligent prompt routing(內建自動路由)。自建分類器+Lambda(A)/規則式關鍵字(D)實作多;單一模型(C)無路由且成本差。"}, {"num": 84, "stem": "A specialty coffee company has a mobile app that generates personalized coffee roast profiles by using Amazon Bedrock with a three-stage prompt chain. The prompt chain converts user inputs into structured metadata, retrieves relevant logs for coffee roasts, and generates a personalized roast recommendation for each customer. Users in multiple AWS Regions report inconsistent roast recommendations for identical inputs, slow inference during the retrieval step, and unsafe recommendations such as brewing at excessively high temperatures. The company must improve the stability of outputs for repeated inputs. The company must also improve app performance and the safety of the app's outputs. The updated solution must ensure 99.5% output consistency for identical inputs and achieve inference latency of less than 1 second. The solution must also block unsafe or hallucinated recommendations by using validated safety controls. Which solution will meet these requirements?", "options": {"A": "Deploy Amazon Bedrock with provisioned throughput to stabilize inference latency. Apply Amazon Bedrock guardrails that have semantic denial rules to block unsafe outputs. Use Amazon Bedrock Prompt Management to manage prompts by using approval workflows.", "B": "Use Amazon Bedrock Agents to manage chaining. Log model inputs and outputs to Amazon CloudWatch Logs. Use logs from Amazon CloudWatch to perform A/B testing for prompt versions.", "C": "Cache prompt results in Amazon ElastiCache. Use AWS Lambda functions to pre-process metadata and to trace end-to-end latency. Use AWS X-Ray to identify and remediate performance bottlenecks.", "D": "Use Amazon Kendra to improve roast log retrieval accuracy. Store normalized prompt metadata within Amazon DynamoDB. Use AWS Step Functions to orchestrate multistep prompts."}, "answers": ["A"], "explain": "輸出一致性 + 低延遲 + 阻擋不安全/幻覺 → provisioned throughput(穩定低延遲)+ Guardrails semantic denial(阻擋不安全)+ Prompt Management(一致性)。B、C、D 都缺「阻擋不安全輸出」的安全控制。"}, {"num": 85, "stem": "A company is developing a generative AI (GenAI) application by using Amazon Bedrock. The application will analyze patterns and relationships in the company's data. The application will process millions of new data points daily across AWS Regions in Europe, North America, and Asia before storing the data in Amazon S3. The application must comply with local data protection and storage regulations. Data residency and processing must occur within the same continent. The application must also maintain audit trails of the application's decision-making processes and provide data classification capabilities. Which solution will meet these requirements?", "options": {"A": "Deploy the application in each Region with local IAM policies. Use Amazon Bedrock cross-Region inference to distribute the workload. Use Amazon CloudWatch to log AI decision-making processes and data processing activities. Manually track compliance certifications across Regions.", "B": "Use SCPs with AWS Organizations to manage location-specific permissions. Use AWS CloudTrail immutable logs to audit the decision-making processes. Import a custom model into Amazon Bedrock and deploy the model to each Region.", "C": "Use Amazon S3 Object Lock with Region-specific S3 bucket policies. Pre-process the data points within the Region based on geographic origin before sending the data points to Amazon Bedrock. Use Amazon Macie to classify the data. Use AWS CloudTrail immutable logs to audit the decision-making processes.", "D": "Create separate AWS accounts for each Region with individual compliance frameworks. Use Amazon SageMaker AI with custom monitoring to track model performance and compliance with data residency requirements. Create manual reports for each regulatory jurisdiction."}, "answers": ["C"], "explain": "資料駐留同大陸 + 稽核 + 資料分類 → 區域內依地理來源預處理(駐留)+ S3 Object Lock/區域政策 + Macie(S3 資料分類)+ CloudTrail 不可變日誌。cross-Region 分散(A)可能跨大陸;手動追蹤/報告(A、D)易錯;缺分類(B)。"}, {"num": 86, "stem": "A financial services company is deploying a generative AI (GenAI) application that uses Amazon Bedrock to assist customer service representatives to provide personalized investment advice to customers. The company must implement a comprehensive governance solution that follows responsible AI practices and meets regulatory requirements. The solution must detect and prevent hallucinations in recommendations. The solution must have safety controls for customer interactions. The solution must also monitor model behavior drift in real time and maintain audit trails of all prompt-response pairs for regulatory review. The company must deploy the solution within 60 days. The solution must integrate with the company's existing compliance dashboard and respond to customers within 200 ms. Which solution will meet these requirements with the LEAST operational overhead?", "options": {"A": "Configure Amazon Bedrock guardrails to apply custom content filters and toxicity detection. Use Amazon Bedrock Model Evaluation to detect hallucinations. Store prompt-response pairs in Amazon DynamoDB to capture audit trails and set a TTL. Integrate Amazon CloudWatch custom metrics with the existing compliance dashboard.", "B": "Deploy Amazon Bedrock and use AWS PrivateLink to access the application securely. Use AWS Lambda functions to implement custom prompt validation. Store prompt-response pairs in an Amazon S3 bucket and configure S3 Lifecycle policies. Create custom Amazon CloudWatch dashboards to monitor model performance metrics.", "C": "Use Amazon Bedrock Agents and Amazon Bedrock Knowledge Bases to ground responses. Use Amazon Bedrock Guardrails to enforce content safety. Use Amazon OpenSearch Service to store and index prompt-responses pairs. Integrate OpenSearch Service with Amazon QuickSight to create compliance reports and to detect model behavior drift.", "D": "Use Amazon SageMaker Model Monitor to detect model behavior drift. Use AWS WAF to filter content. Store customer interactions in an encrypted Amazon RDS database. Use Amazon API Gateway to create custom HTTP APIs to integrate with the compliance dashboard."}, "answers": ["A"], "explain": "偵測幻覺 + 安全 + 即時漂移 + 稽核 + 最少負擔 → Guardrails(安全)+ Model Evaluation(幻覺)+ DynamoDB+TTL(稽核)+ CloudWatch 自訂指標整合儀表板(即時漂移)。SageMaker Model Monitor(D)非 Bedrock + WAF 非內容安全;QuickSight(C)是批次非即時。"}, {"num": 87, "stem": "A company uses AWS Lake Formation to set up a data lake that contains databases and tables for multiple business units across multiple AWS Regions. The company wants to use a foundation model (FM) through Amazon Bedrock to perform fraud detection. The FM must ingest sensitive financial data from the data lake. The data includes some customer personally identifiable information (PII). The company must design an access control solution that prevents PII from appearing in a production environment. The FM must access only authorized data subsets that have PII redacted from specific data columns. The company must capture audit trails for all data access. Which solution will meet these requirements?", "options": {"A": "Create a separate dataset in a separate Amazon S3 bucket for each business unit and Region combination. Configure S3 bucket policies to control access based on IAM roles that are assigned to FM training instances. Use S3 access logs to track data access.", "B": "Configure the FM to authenticate by using IAM roles and Lake Formation permissions based on LF-Tag expressions. Define business units and Regions as LF-Tags that are assigned to databases and tables. Use AWS CloudTrail to collect comprehensive audit trails of data access.", "C": "Use direct IAM principal grants on specific databases and tables in Lake Formation. Create a custom application layer that logs access requests and further filters sensitive columns before sending data to the FM.", "D": "Configure the FM to request temporary credentials from AWS STS. Access the data by using presigned S3 URLs that are generated by an API that applies business unit and Regional filters. Use AWS CloudTrail to collect comprehensive audit trails of data access."}, "answers": ["B"], "explain": "欄位層級遮蔽 PII + 授權子集 + 跨業務/區域 + 稽核 → Lake Formation LF-Tag 表達式(欄位層級+標籤式授權)+ IAM 角色 + CloudTrail。S3 桶政策(A)/presigned URL(D)是物件層級做不到欄位;直接授權(C)不可擴展+自建。"}, {"num": 88, "stem": "A company runs a Retrieval Augmented Generation (RAG) application that uses Amazon Bedrock Knowledge Bases to perform regulatory compliance queries. The application uses the RetrieveAndGenerateStream API. The application retrieves relevant documents from a knowledge base that contains more than 50,000 regulatory documents, legal precedents, and policy updates. The RAG application is producing suboptimal responses because the initial retrieval often returns semantically similar but contextually irrelevant documents. The poor responses are causing model hallucinations and incorrect regulatory guidance. The company needs to improve the performance of the RAG application so it returns more relevant documents. Which solution will meet this requirement with the LEAST operational overhead?", "options": {"A": "Deploy an Amazon SageMaker endpoint to run a fine-tuned ranking model. Use an Amazon API Gateway REST API to route requests. Configure the application to make requests through the REST API to rerank the results.", "B": "Use Amazon Comprehend to classify documents and apply relevance scores. Integrate the RAG application's reranking process with Amazon Textract to run document analysis. Use Amazon Neptune to perform graph-based relevance calculations.", "C": "Implement a retrieval pipeline that uses the Amazon Bedrock Knowledge Bases Retrieve API to perform initial document retrieval. Call the Amazon Bedrock Rerank API to rerank the results. Invoke the InvokeModelWithResponseStream operation to generate responses.", "D": "Use the latest Amazon reranker model through the reranking configuration within Amazon Bedrock Knowledge Bases. Use the model to improve document relevance scoring and to reorder results based on contextual assessments."}, "answers": ["D"], "explain": "語意近但不相關 + 改善相關性 + 最少負擔 → Bedrock Knowledge Bases 內建 reranking configuration(只需啟用)。自建管道 Retrieve+Rerank+InvokeModel(C)負擔較高;SageMaker 自訓(A)最高;Comprehend/Textract/Neptune(B)非 rerank。"}, {"num": 89, "stem": "A company is developing a customer communication platform that uses an AI assistant powered by an Amazon Bedrock foundation model (FM). The AI assistant summarizes customer messages and generates initial response drafts. The company wants to use Amazon Comprehend to implement layered content filtering. The layered content filtering must prevent sharing of offensive content, protect customer privacy, and detect potential inappropriate advice solicitation. Inappropriate advice solicitation includes requests for unethical practices, harmful activities, or manipulative behaviors. The solution must maintain acceptable overall response times, so all pre-processing filters must finish before the content reaches the FM. Which solution will meet these requirements?", "options": {"A": "Use parallel processing with asynchronous API calls. Use toxicity detection for offensive content. Use prompt safety classification for inappropriate advice solicitation. Use personally identifiable information (PII) detection without redaction.", "B": "Use custom classification to build an FM that detects offensive content and inappropriate advice solicitation. Apply personally identifiable information (PII) detection as a secondary filter only when messages pass the custom classifier.", "C": "Deploy a multi-stage process. Configure the process to use prompt safety classification first, then toxicity detection on safe prompts only, and finally personally identifiable information (PII) detection in streaming mode. Route flagged messages through Amazon EventBridge for human review.", "D": "Use toxicity detection with thresholds configured to 0.5 for all categories. Use parallel processing for both prompt safety classification and personally identifiable information (PII) detection with entity redaction. Apply Amazon CloudWatch alarms to filter metrics."}, "answers": ["D"], "explain": "分層過濾(冒犯+隱私+不當請求)+ 維持回應時間 → 並行 parallel + toxicity + prompt safety + PII with redaction(遮蔽才保護隱私)。PII 不遮蔽(A)無效;多階段串接+EventBridge 人工審(C)延遲高;自建 FM 分類(B)成本高。"}, {"num": 90, "stem": "A software as a service (SaaS) company is building a recommendation model that uses Amazon SageMaker AI to support an application that recommends airline cabin upgrades to customers. The company will host SageMaker AI models on Amazon Bedrock by using Amazon Bedrock Custom Model Import. Airline companies will use the application to send customized offers to customers. The model must examine the travel history of customers to help make more relevant recommendations. The company stores customer travel history data in an Amazon RDS database. The company must ensure that the application delivers consistent, relevant, and accurate results across multiple airlines and customer populations. Which solution will meet these requirements?", "options": {"A": "Use Amazon Bedrock Knowledge Bases to implement a RAG architecture to analyze customer travel history data to give the application semantic search capabilities. Use the semantic search capabilities to retrieve relevant booking patterns, preferences, and loyalty information to generate personalized cabin upgrade recommendations. Apply Amazon Bedrock guardrails to filter content. Use AWS Step Functions and AWS Lambda functions to orchestrate validation workflows to reduce hallucinations.", "B": "Implement text-to-SQL transformations with SQL validations to accurately retrieve relevant booking patterns, preferences, and loyalty information from the RDS database. Use the results to generate personalized cabin upgrade recommendations. Apply Amazon Bedrock guardrails to filter content. Use AWS Step Functions and AWS Lambda functions to orchestrate validation workflows to reduce hallucinations.", "C": "Use Amazon OpenSearch Service to implement vector searches of customer travel history embeddings. Use the vector searches to give the application the ability to perform similarity-based retrieval of booking patterns, preferences, and loyalty information to generate personalized cabin upgrade recommendations. Apply Amazon Bedrock guardrails to filter responses. Use confidence scoring and semantic similarity searches to reduce hallucinations.", "D": "Implement text-to-SQL transformations with SQL validations to accurately retrieve relevant booking patterns, preferences, and loyalty information from the RDS database. Use the results to generate personalized cabin upgrade recommendations. Apply Amazon Bedrock guardrails to filter responses. Use confidence scoring and semantic similarity searches to reduce hallucinations."}, "answers": ["B"], "explain": "結構化資料(RDS)精確檢索 + 一致準確 + 減幻覺 → text-to-SQL + SQL 驗證 + Step Functions/Lambda 驗證工作流。RAG/向量搜尋(A、C)適合非結構化;B vs D:結構化用「驗證工作流」減幻覺(B),非語意相似度搜尋(D)。"}, {"num": 91, "stem": "A company is using Amazon Bedrock to develop a customer support AI assistant. The AI assistant must respond to customer questions about their accounts. The AI assistant must not expose personal information in responses. The company must comply with data residency policies by ensuring that all processing occurs within the same AWS Region where each customer is located. The company wants to evaluate how effective the AI assistant is at preventing the exposure of personal information before the company makes the AI assistant available to customers. Which solution will meet these requirements?", "options": {"A": "Configure a cross-Region Amazon Bedrock guardrail to apply sensitive information filters. Set the guardrail to detect mode during development and testing. Switch to block mode for production deployment.", "B": "Configure an Amazon Bedrock guardrail to apply sensitive information filters. Set the guardrail to mask mode during development and testing. Switch to block mode for production deployment. Deploy a copy of the guardrail to each Region where the company operates.", "C": "Configure an Amazon Bedrock guardrail to apply content and topic filters. Set the guardrail to detect mode during development, testing, and production. Disable invocation logging for the Amazon Bedrock model.", "D": "Configure a cross-Region Amazon Bedrock guardrail to apply a set of content and word filters. Set the guardrail to detect mode during development and testing. Switch to mask mode for production deployment."}, "answers": ["B"], "explain": "不暴露 PII + 資料駐留各區處理 + 部署前評估 → 敏感資訊過濾器 + mask(評估可觀察)/block(生產阻擋)+ 每區部署 guardrail(駐留)。cross-Region(A、D)違反駐留;content/word filters(C、D)非 PII 工具;生產只 detect(C)會暴露。"}, {"num": 92, "stem": "A university recently digitized a collection of archival documents, academic journals, and manuscripts. The university stores the digital files in an AWS Lake Formation data lake. The university hires a GenAI developer to build a solution to allow users to search the digital files by using text queries. The solution must return journal abstracts that are semantically similar to a user's query. Users must be able to search the digitized collection based on text and metadata that is associated with the journal abstracts. The metadata of the digitized files does not contain keywords. The solution must match similar abstracts to one another based on the similarity of their text. The data lake contains fewer than 1 million files. Which solution will meet these requirements with the LEAST operational overhead?", "options": {"A": "Use Amazon Titan Embeddings in Amazon Bedrock to create vector representations of the digitized files. Store embeddings in the OpenSearch Neural Plugin for Amazon OpenSearch Service.", "B": "Use Amazon Comprehend to extract topics from the digitized files. Store the topics and file metadata in an Amazon Aurora PostgreSQL database. Query the abstract metadata against the data in the Aurora database.", "C": "Use Amazon SageMaker AI to deploy a sentence-transformer model. Use the model to create vector representations of the digitized files. Store embeddings in an Amazon Aurora PostgreSQL database that has the pgvector extension.", "D": "Use Amazon Titan Embeddings in Amazon Bedrock to create vector representations of the digitized files. Store embeddings in an Amazon Aurora PostgreSQL Serverless database that has the pgvector extension."}, "answers": ["D"], "explain": "語意相似搜尋 + 中小規模(<100萬)+ 最少負擔 → 託管 Titan Embeddings + Aurora PostgreSQL Serverless + pgvector。OpenSearch(A)是大規模工具+管叢集;自建 SageMaker 嵌入(C)負擔高;Comprehend 主題(B)非語意相似。"}, {"num": 93, "stem": "A financial services company wants to use Amazon Bedrock foundation models (FMs) to analyze call center recordings. When calls end, the call center stores recordings as MP3 files in an Amazon S3 bucket. The company needs to generate summaries and sentiment analysis for the recordings in a structured format as soon as new files are created. The recordings average 20 MB in size. Which combination of solutions will meet these requirements? (Choose two.)", "options": {"A": "Use AWS Step Functions to orchestrate a workflow to process the recordings. Configure steps to invoke Amazon Transcribe to convert audio to text, validate job completion, and to invoke an AWS Lambda function to process the text by using Amazon Bedrock FMs to generate structured analysis output.", "B": "Use AWS Step Functions to orchestrate a workflow to process the recordings. Configure steps to invoke Amazon Transcribe to convert audio to text, validate job completion, and to directly invoke Amazon Bedrock FMs to generate summaries and sentiment analysis in JSON format.", "C": "Use AWS Step Functions to orchestrate a workflow to process the recordings. Configure steps to invoke Amazon Transcribe to convert audio to text, validate job completion, and to invoke an AWS Lambda function to create a prompt to invoke Amazon Bedrock FMs to generate structured analysis output.", "D": "Configure the source S3 bucket to send events to Amazon EventBridge. Create an EventBridge rule to invoke the Step Functions workflow when an object is created in the bucket.", "E": "Configure the source S3 bucket to send notifications to the Step Functions workflow when an object is created in the bucket."}, "answers": ["C", "D"], "explain": "S3 新檔觸發(必經 EventBridge,S3 不能直接觸發 Step Functions,刪 E)→ D;Transcribe→Lambda 建 prompt→Bedrock 結構化(C 明確「建立 prompt」優於 A;直接呼叫 B 較難可靠結構化)。"}, {"num": 94, "stem": "A medical device company wants to feed reports of medical procedures that used the company's devices into an AI assistant. To protect patient privacy, the AI assistant must expose patient personally identifiable information (PII) only to surgeons. The AI assistant must redact PII for engineers. The AI assistant must reference only medical reports that are less than 3 years old. The company stores reports in an Amazon S3 bucket as soon as each report is published. The company has already set up an Amazon Bedrock knowledge base. The AI assistant uses Amazon Cognito to authenticate users. Which solution will meet these requirements?", "options": {"A": "Enable Amazon Macie PII detection on the S3 bucket. Use an S3 trigger to invoke an AWS Lambda function that redacts PII from the reports. Configure the Lambda function to delete outdated documents from the bucket and to invoke knowledge base syncing.", "B": "Invoke an AWS Lambda function to sync the S3 bucket and the knowledge base when a new report is uploaded to the bucket. Use a second Lambda function to invoke Amazon Comprehend to detect and redact PII if a user is part of the engineer Cognito user group. Set up an S3 Lifecycle configuration to remove reports that are older than 3 years from the bucket.", "C": "Set up an S3 Lifecycle configuration on the bucket to remove reports that are older than 3 years. Schedule an AWS Lambda function to run daily syncs between the bucket and the knowledge base. When users interact with the AI assistant, call the ApplyGuardrail configuration that matches the user's Cognito user group to redact PII from the agent's responses if appropriate.", "D": "Create a second knowledge base. Set up an S3 Lifecycle configuration on the bucket to remove reports that are older than 3 years. Invoke an AWS Lambda function that syncs the bucket with the original knowledge base when a new report is uploaded to the bucket. Use Amazon Comprehend to detect and redact PII before syncing the bucket with the second knowledge base. When a user interacts with the AI assistant, redirect the model to the appropriate knowledge base depending on the user's Cognito user group."}, "answers": ["C"], "explain": "依角色差異化 PII(醫生暴露/工程師遮蔽)+ 只用近 3 年 → S3 Lifecycle(移除過時)+ ApplyGuardrail 依 Cognito 群組在「回應時」動態遮蔽。來源永久遮蔽(A)醫生也看不到;兩個 KB(D)過度設計。"}, {"num": 95, "stem": "A large ecommerce company has deployed a foundation model (FM) to generate product descriptions. The company's engineering team monitors technical metrics such as token usage, latency, and error rates by using Amazon CloudWatch. The company's marketing team tracks business metrics such as conversion rates and revenue impact in its own systems. The company needs a unified observability solution that correlates technical performance with business outcomes. The solution must provide automatic alerts to stakeholders when operational metrics indicate degradation. The solution must provide comprehensive visibility across both technical and business metrics. Which solution will meet these requirements?", "options": {"A": "Create CloudWatch dashboards that include technical metrics and imported business metrics. Configure CloudWatch composite alarms that combine technical data and business data. Use Amazon SNS to set up notifications to stakeholders.", "B": "Use Amazon Managed Grafana to visualize technical metrics from CloudWatch with business metrics from external sources. Configure Amazon Managed Grafana alerts to invoke AWS Lambda functions. Configure the Lambda functions to remediate issues automatically when metrics exceed predefined thresholds.", "C": "Stream CloudWatch metrics to Amazon S3 by using CloudWatch metric streams. Create Amazon QuickSight dashboards to visualize the combined technical metrics and business metrics. Set up Amazon EventBridge rules to send notifications to stakeholders when metrics exceed predefined thresholds.", "D": "Configure CloudWatch custom dashboards that integrate operational metrics with imported business metrics. Set up CloudWatch composite alarms with anomaly detection. Use Amazon SNS to create alarm actions to notify stakeholders when correlated metrics indicate performance issues."}, "answers": ["D"], "explain": "統一可觀測性 + 偵測降級 + 警報 → CloudWatch 整合儀表板 + composite alarms with anomaly detection(偵測降級)+ SNS。A 只有固定門檻無 anomaly detection;自動修復(B)超出需求;QuickSight(C)是批次非即時。"}, {"num": 96, "stem": "A GenAI developer is evaluating Amazon Bedrock foundation models (FMs) to enhance a Europe-based company's internal business application. The company has a multi-account landing zone in AWS Control Tower. The company uses SCPs to allow its accounts to use only the eu-north-1 Region and the eu-west-1 Region. All customer data must remain in private networks within the approved AWS Regions. The GenAI developer selects an FM based on analysis and testing and hosts the model in the eu-central-1 Region and the eu-west-3 Region. The GenAI developer must enable access to the FM for the company's employees. The GenAI developer must ensure that requests to the FM are private and remain with the same Regions as the FM. Which solution will meet these requirements?", "options": {"A": "Deploy an AWS Lambda function that is exposed by a private Amazon API Gateway REST API to a VPC in eu-north-1. Create a VPC endpoint for the selected FM in eu-central-1 and eu-west-3. Extend existing SCPs to allow employees to use the FM. Integrate the REST API with the business application.", "B": "Deploy the FM on Amazon EC2 instances in eu-north-1. Deploy a private Amazon API Gateway REST API in front of the EC2 instances. Configure an Amazon Bedrock VPC endpoint. Integrate the REST API with the business application.", "C": "Configure the FM to use cross-Region inference through an eu.amazon.* endpoint to ensure that all calls remain within Europe. Configure an Amazon Bedrock VPC endpoint. Extend existing SCPs to allow employees to use the FM through inference profiles in Europe-based Regions where the FM is available. Use an inference profile to integrate Amazon Bedrock with the business application.", "D": "Deploy the FM in Amazon SageMaker AI in eu-north-1. Configure a SageMaker AI VPC endpoint. Extend existing SCPs to allow employees to use the SageMaker AI endpoint. Integrate the FM in SageMaker AI with the business application."}, "answers": ["C"], "explain": "Bedrock FM 跨歐洲 + 資料保留歐洲 + 私有 + SCP 區域限制 → Geographic cross-Region inference(eu.* 端點保留歐洲)+ Bedrock VPC endpoint(私有)+ 調整 SCP + inference profile。EC2(B)/SageMaker(D)自建負擔高且偏離 Bedrock。"}, {"num": 97, "stem": "A healthcare company is developing an application to process medical queries. The application must answer complex queries with high accuracy by reducing semantic dilution. The application must refer to domain-specific terminology in medical documents to reduce ambiguity in medical terminology. The application must be able to respond to 1,000 queries each minute with response times less than 2 seconds. Which solution will meet these requirements with the LEAST operational overhead?", "options": {"A": "Use Amazon API Gateway to route incoming queries to an Amazon Bedrock agent. Configure the agent to use an Anthropic Claude model to decompose queries and an Amazon Titan model to expand queries. Create an Amazon Bedrock knowledge base to store the reference medical documents.", "B": "Configure an Amazon Bedrock knowledge base to store the reference medical documents. Enable query decomposition in the knowledge base. Configure an Amazon Bedrock flow that uses a foundation model (FM) and the knowledge base to support the application.", "C": "Use Amazon SageMaker AI to host custom ML models for both query decomposition and query expansion. Configure Amazon Bedrock knowledge bases to store the reference medical documents. Encrypt the documents in the knowledge base.", "D": "Create an Amazon Bedrock agent to orchestrate multiple AWS Lambda functions to decompose queries. Create an Amazon Bedrock knowledge base to store the reference medical documents. Use the agent's built-in knowledge base capabilities. Add deep research and reasoning capabilities to the agent to reduce ambiguity in the medical terminology."}, "answers": ["B"], "explain": "複雜查詢減語意稀釋 + RAG + 高效能 + 最少負擔 → Knowledge Base 內建 query decomposition + RAG + flow。agent 自建分解/擴展(A、D)實作多;SageMaker 自訂模型(C)負擔最高;深度研究(D)較慢可能超 2 秒。"}];
let pool=[], idx=0, results=[], current=null, selected=new Set(), answered=false, instant=true;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startQuiz(){
  let n = parseInt(document.getElementById('count').value)||97;
  n = Math.max(1, Math.min(97, n));
  instant = document.getElementById('instant').checked;
  pool = shuffle(QUESTIONS.slice()).slice(0, n);
  idx=0; results=[];
  document.getElementById('start').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  current = pool[idx];
  selected = new Set(); answered=false;
  const multi = current.answers.length>1;
  document.getElementById('progress').textContent = `第 ${idx+1} / ${pool.length} 題`;
  const right = results.filter(r=>r.correct).length;
  document.getElementById('livescore').textContent = `✔ ${right}　✘ ${results.length-right}`;
  document.getElementById('barfill').style.width = (idx/pool.length*100)+'%';
  const typeTag = multi
    ? `<span class="tag multi">複選 — 請選 ${current.answers.length} 個</span>`
    : `<span class="tag single">單選</span>`;
  document.getElementById('tag').innerHTML =
    `<span class="tag origin">📄 原文件 Question #${current.num}</span>${typeTag}`;
  document.getElementById('stem').textContent = current.stem;
  const ob = document.getElementById('options'); ob.innerHTML='';
  Object.keys(current.options).sort().forEach(letter=>{
    const div=document.createElement('div');
    div.className='opt'; div.dataset.letter=letter;
    div.innerHTML=`<span class="lab">${letter}</span><span class="txt">${escapeHtml(current.options[letter])}</span>`;
    div.onclick=()=>toggle(letter,multi,div);
    ob.appendChild(div);
  });
  document.getElementById('explainBox').innerHTML='';
  document.getElementById('submitBtn').classList.remove('hidden');
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('nextBtn').classList.add('hidden');
}

function toggle(letter,multi,div){
  if(answered) return;
  if(multi){
    if(selected.has(letter)){ selected.delete(letter); div.classList.remove('selected'); }
    else { selected.add(letter); div.classList.add('selected'); }
  } else {
    selected.clear();
    document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
    selected.add(letter); div.classList.add('selected');
  }
  document.getElementById('submitBtn').disabled = selected.size===0;
}

function submitAnswer(){
  if(selected.size===0) return;
  answered=true;
  const correctSet = new Set(current.answers);
  const sel = [...selected].sort();
  const isCorrect = sel.length===correctSet.size && sel.every(s=>correctSet.has(s));
  results.push({num:current.num, correct:isCorrect, selected:sel, correctAns:current.answers, q:current});

  document.querySelectorAll('.opt').forEach(o=>{
    const L=o.dataset.letter; o.classList.add('disabled'); o.onclick=null;
    if(correctSet.has(L)){ o.classList.add('correct'); o.querySelector('.lab').insertAdjacentHTML('afterend',' '); o.insertAdjacentHTML('beforeend','<span class="mark ok">✔</span>'); }
    else if(selected.has(L)){ o.classList.add('wrong'); o.insertAdjacentHTML('beforeend','<span class="mark no">✘</span>'); }
  });

  const eb=document.getElementById('explainBox');
  const banner = isCorrect ? '<span class="ok">✅ 答對了！</span>' : `<span class="no">❌ 答錯了</span>　正確答案：<b>${current.answers.join(', ')}</b>`;
  let exp = current.explain ? `<div class="explain"><b>考點背法 🎯</b><br>${escapeHtml(current.explain)}</div>` : '';
  eb.innerHTML = `<div class="result-banner">${banner}</div>${exp}`;

  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  const right = results.filter(r=>r.correct).length;
  document.getElementById('livescore').textContent = `✔ ${right}　✘ ${results.length-right}`;

  if(!instant){ /* still show because requested simple */ }
}

function nextQuestion(){
  idx++;
  if(idx>=pool.length){ finish(); return; }
  renderQuestion();
}

function finish(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  const total=results.length;
  const right=results.filter(r=>r.correct).length;
  const wrong=total-right;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sRight').textContent=right;
  document.getElementById('sWrong').textContent=wrong;
  const pct = total? Math.round(right/total*100):0;
  document.getElementById('resultSub').textContent = `總共作答 ${total} 題，答對 ${right} 題、答錯 ${wrong} 題，正確率 ${pct}%。`;
  drawDonut(pct);

  const wrongs=results.filter(r=>!r.correct);
  const ww=document.getElementById('wrongWrap');
  if(wrongs.length===0){
    ww.innerHTML='<div class="explain ok"><b>🎉 全部答對，太強了！</b></div>';
    document.getElementById('redoWrongBtn').style.display='none';
  } else {
    let h=`<h1 style="font-size:1.1rem;margin-top:10px;">❌ 錯題回顧（${wrongs.length} 題）</h1><div class="wronglist">`;
    wrongs.forEach(r=>{
      let opts = Object.keys(r.q.options).sort().map(L=>{
        const isC=r.correctAns.includes(L), isS=r.selected.includes(L);
        let pre = isC?'✔ ':(isS?'✘ ':'　');
        let style = isC?'color:var(--green);font-weight:700':(isS?'color:var(--red)':'');
        return `<div class="small" style="${style}">${pre}${L}. ${escapeHtml(r.q.options[L])}</div>`;
      }).join('');
      h+=`<div class="wq"><div class="qn">📄 原文件 Question #${r.num}</div>
          <div class="small">${escapeHtml(r.q.stem)}</div>
          <div style="margin-top:8px;">${opts}</div>
          <div class="answer-line">你的選擇：<b class="no">${r.selected.join(', ')||'—'}</b>　|　正確答案：<b class="ok">${r.correctAns.join(', ')}</b></div>
          ${r.q.explain?`<div class="explain"><b>考點背法 🎯</b><br>${escapeHtml(r.q.explain)}</div>`:''}
        </div>`;
    });
    h+='</div>';
    ww.innerHTML=h;
    document.getElementById('redoWrongBtn').style.display='';
    window._wrongNums = wrongs.map(r=>r.num);
  }
}

function redoWrong(){
  const nums = window._wrongNums||[];
  if(!nums.length) return;
  pool = shuffle(QUESTIONS.filter(q=>nums.includes(q.num)));
  idx=0; results=[];
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQuestion();
}

function drawDonut(pct){
  const svg=document.getElementById('donut'); const r=64, c=2*Math.PI*r, off=c*(1-pct/100);
  const col = pct>=80?'#22c55e':(pct>=60?'#f59e0b':'#ef4444');
  svg.innerHTML=`
    <circle cx="80" cy="80" r="${r}" fill="none" stroke="#273449" stroke-width="16"/>
    <circle cx="80" cy="80" r="${r}" fill="none" stroke="${col}" stroke-width="16"
       stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
       transform="rotate(-90 80 80)"/>
    <text x="80" y="80" text-anchor="middle" dominant-baseline="central"
       fill="#e2e8f0" font-size="30" font-weight="800">${pct}%</text>`;
}

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
